<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Flyer</title>
    <style>
      :root {
        --safe: 6%;
        --gap: clamp(0.2cm, 2.7vw, 0.6cm);
        --display: clamp(20pt, 8.5vw, 44pt);
        --body: clamp(9pt, 2.5vw, 11pt);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      body {
        font-family: "Trebuchet MS", "Helvetica Neue", sans-serif;
        color: #1c1b19;
        background: #f6f1e7;
      }

      .page {
        width: 100%;
        height: 100%;
        padding: var(--safe);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: var(--gap);
        position: relative;
      }

      .motif {
        position: absolute;
        inset: 0;
        opacity: 0.26;
        pointer-events: none;
      }

      .tag {
        justify-self: start;
        font-size: clamp(8pt, 2vw, 10pt);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 0.04cm solid #1c1b19;
        padding: 0.07cm 0.24cm;
      }

      h1 {
        margin: 0;
        max-width: 11ch;
        font-size: var(--display);
        line-height: 0.92;
        text-transform: uppercase;
      }

      .details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: clamp(0.16cm, 2vw, 0.4cm);
        align-content: start;
        font-size: var(--body);
      }

      .details h2 {
        margin: 0 0 0.07cm;
        font-size: clamp(11pt, 2.8vw, 14pt);
      }

      .cta {
        align-self: end;
        justify-self: start;
        font-size: clamp(10pt, 2.5vw, 12pt);
        font-weight: 700;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <img class="motif" src="assets/rays.svg" alt="Decorative motif" />
      <div class="tag">Saturday / Oct 18</div>
      <h1>Night Market Sessions</h1>
      <section class="details">
        <article>
          <h2>Live Sets</h2>
          <div>18:00 - Kavo Ensemble</div>
          <div>20:00 - Fragments Choir</div>
          <div>22:00 - Low Harbor DJs</div>
        </article>
        <article>
          <h2>Venue</h2>
          <div>Foundry Hall, District 7</div>
          <div>Food courtyard + vinyl pop-ups</div>
          <div>Advance: $22 / Door: $28</div>
        </article>
      </section>
      <div class="cta">Reserve: northline.studio/market</div>
    </main>
  </body>
</html>
