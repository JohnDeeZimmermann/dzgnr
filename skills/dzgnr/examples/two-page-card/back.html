<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two Page Card Back</title>
    <style>
      :root {
        --safe: 6%;
        --line: 0.04cm;
        --body: clamp(7pt, 2vw, 8.5pt);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      body {
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: #11202b;
        background: linear-gradient(140deg, #dceff8 0%, #bfd7e8 60%, #a9c5d8 100%);
      }

      .card {
        width: 100%;
        height: 100%;
        padding: var(--safe);
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: clamp(0.06cm, 1.2vw, 0.12cm);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: clamp(0.12cm, 1.8vw, 0.24cm);
      }

      .brand img {
        width: 0.6cm;
        height: 1cm;
        object-fit: contain;
      }

      .brand .name {
        font-size: clamp(8pt, 2.4vw, 10pt);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .services {
        align-self: center;
        border-top: var(--line) solid rgba(17, 32, 43, 0.35);
        border-bottom: var(--line) solid rgba(17, 32, 43, 0.35);
        padding: clamp(0.08cm, 1.2vw, 0.14cm) 0;
        display: grid;
        gap: 0.02cm;
        font-size: var(--body);
      }

      .url {
        justify-self: end;
        font-size: clamp(7pt, 2vw, 8pt);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="brand">
        <img src="assets/mark.svg" alt="Brand mark" />
        <div class="name">Northline Studio</div>
      </section>
      <section class="services">
        <div>Brand Identity</div>
        <div>Packaging Systems</div>
        <div>Editorial Art Direction</div>
      </section>
      <div class="url">northline.studio</div>
    </main>
  </body>
</html>
