<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Card</title>
    <style>
      :root {
        --safe: 5.5%;
        --line: clamp(0.03cm, 0.2vw, 0.05cm);
        --heading: clamp(12pt, 4.4vw, 18pt);
        --body: clamp(7.5pt, 2.2vw, 9pt);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      body {
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: #f6f6f4;
        background: linear-gradient(135deg, #101922 0%, #1f3140 65%, #274b60 100%);
      }

      .card {
        width: 100%;
        height: 100%;
        padding: var(--safe);
        display: grid;
        grid-template-columns: auto 1fr;
        gap: clamp(0.2cm, 3vw, 0.5cm);
        align-items: center;
      }

      .mark {
        width: clamp(0.9cm, 20%, 1.35cm);
        align-self: stretch;
        display: grid;
        place-items: center;
      }

      .mark img {
        width: 100%;
        height: auto;
        display: block;
      }

      .content {
        display: grid;
        gap: clamp(0.05cm, 1.2vw, 0.12cm);
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: var(--heading);
        line-height: 1;
        letter-spacing: 0.02em;
      }

      .role {
        font-size: clamp(8pt, 2.4vw, 10pt);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.9;
      }

      .contact {
        margin-top: clamp(0.06cm, 1vw, 0.14cm);
        padding-top: clamp(0.08cm, 1vw, 0.13cm);
        border-top: var(--line) solid rgba(246, 246, 244, 0.6);
        display: grid;
        gap: 0.02cm;
        font-size: var(--body);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <aside class="mark"><img src="assets/mark.svg" alt="Brand mark" /></aside>
      <section class="content">
        <h1>Rowan Hale</h1>
        <div class="role">Design Director</div>
        <div class="contact">
          <div>rowan@northline.studio</div>
          <div>+1 415 555 0196</div>
          <div>northline.studio</div>
        </div>
      </section>
    </main>
  </body>
</html>
